<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Selectors and Events</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

    <h1>jQuery Selectors & Events</h1>

    <p>This is the first paragraph.</p>
    <p>This is the second paragraph.</p>
    <p>This is the third paragraph.</p>

    <button id="hideBtn">Hide All Paragraphs</button>
    <button id="showBtn">Show All Paragraphs</button>
    <button id="colorBtn">Change Paragraph Color</button>

    <script>
        $(document).ready(function () {

            $("#hideBtn").click(function () {
                $("p").hide();
            });

            $("#showBtn").click(function () {
                $("p").show();
            });

            $("#colorBtn").click(function () {
                $("p").css("color", "blue");
            });

        });
    </script>

</body>
</html>
