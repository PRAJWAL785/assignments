<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <center>
        <h1>Hospital Appointment</h1>
    </center>
    <hr>
    <h2>Patient Information</h2>
    <form action="a.php" method="post">
        <label for="name">Name:</label>
        <br>
        <input type="text" id="name" required>
        <br>
        <br>

        <label for="age">Age:</label>
        <br>
        <input type="number" id="age" min="1" required>
        <br>
        <br>
        <label for="gender">Gender:</label>
        <br>
        <input type="radio" name="gender" value="male">Male
        <br>
        <input type="radio" name="gender" value="female">Female
        <br>
        <input type="radio" name="gender" value="other">Other
        <br>
        <br>
        <label for="tel" >Contact Number:</label>
        <br>
        <input type="tel" id="tel" required>
        <hr>
        <h2>Select Doctor</h2>
        <p><b>Doctor:</b></p>
        <select id="doctor" name="doctor">
            <option value="prajwal">Dr. Prajwal</option>
            <option value="komal">Dr. Komal</option>
            <option value="priya">Dr. Priya</option>
        </select>
    <hr>
    <h2>Appointment Schedule</h2>
    <input type="date" name="date" required>
    <input type="time" name="time" required>
    <br>
    <hr>
    <h2>Disease Description</h2>
    <textarea name="disease" rows="10" cols="50" required></textarea>
    <hr>
    <h2>Payment Option</h2>
    <input type="radio" name="payment" value="credit">Credit Card
    <br>
    <input type="radio" name="payment" value="debit">Debit Card
    <br>
    <input type="radio" name="payment" value="cash">Cash
    <br>
    <br>
    <input type="submit" value="Book Appointment">
</form>
</body>
</html>
